<!DOCTYPE html>
<html>
<head>
<title>Rental Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#006aff;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
}

.logo{
font-size:25px;
font-weight:bold;
}

button{
background:white;
border:none;
padding:10px 18px;
border-radius:5px;
cursor:pointer;
}

.hero{
text-align:center;
padding:50px;
background:white;
}

.search{
padding:15px;
width:70%;
border-radius:10px;
border:1px solid #ccc;
}

.container{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 10px #ccc;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.info{
padding:15px;
}

.price{
color:#006aff;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<div class="logo">RentHome</div>

<button>Login</button>
</header>


<section class="hero">

<h1>Find your perfect home</h1>

<input class="search" placeholder="Search city, apartment, house...">

</section>


<div class="container">


<div class="card">

<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">

<div class="info">

<h3>Modern Family House</h3>

<p>New York, USA</p>

<div class="price">$1800/month</div>

</div>

</div>



<div class="card">

<img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c">

<div class="info">

<h3>Luxury Apartment</h3>

<p>Chicago, USA</p>

<div class="price">$2200/month</div>

</div>

</div>


</div>


</body>
</html>
