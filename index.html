<!DOCTYPE html>
<html>
<head>
  <title>Rental Platform</title>
  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f5f5f5;
    }
    header{
      background:#fff;
      padding:20px;
      text-align:center;
      font-size:28px;
      font-weight:bold;
    }
    .search{
      text-align:center;
      padding:40px;
    }
    input{
      width:60%;
      padding:15px;
      border-radius:10px;
      border:1px solid #ccc;
    }
    .card{
      background:white;
      margin:20px;
      padding:20px;
      border-radius:15px;
    }
  </style>
</head>

<body>

<header>
🏠 Rental Platform
</header>

<div class="search">
<input placeholder="Search house location...">
</div>

<div class="card">
<h2>Modern Apartment</h2>
<p>📍 New York</p>
<p>🛏 2 Bedroom | 🚿 1 Bathroom</p>
<h3>$1200 / Month</h3>
</div>

<div class="card">
<h2>Luxury House</h2>
<p>📍 California</p>
<p>🛏 3 Bedroom | 🚿 2 Bathroom</p>
<h3>$2000 / Month</h3>
</div>

</body>
</html>
