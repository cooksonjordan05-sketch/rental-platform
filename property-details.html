<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Details - RentHome</title>

<link rel="stylesheet" href="style.css">

<style>
.container{
    max-width:1200px;
    margin:40px auto;
    padding:20px;
}

.property{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

.property img{
    width:100%;
    border-radius:15px;
}

.info h1{
    margin-bottom:10px;
}

.price{
    color:#0a66ff;
    font-size:30px;
    font-weight:bold;
    margin:15px 0;
}

.features{
    display:flex;
    gap:20px;
    margin:20px 0;
}

.feature{
    background:#f3f4f6;
    padding:10px 15px;
    border-radius:8px;
}

.btn{
    background:#0a66ff;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:8px;
    cursor:pointer;
    margin-top:20px;
}

@media(max-width:768px){
.property{
grid-template-columns:1fr;
}
}
</style>

</head>
<body>

<header>
<div class="logo">🏠 RentHome</div>

<nav>
<a href="index.html">Home</a>
<a href="add-property.html">Add Property</a>
<a href="login.html">Login</a>
</nav>

</header>

<div class="container">

<div class="property">

<div>

<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1200">

</div>

<div class="info">

<h1>Modern Family House</h1>

<p>📍 New York, USA</p>

<div class="price">$1800 / Month</div>

<div class="features">

<div class="feature">🛏 3 Beds</div>

<div class="feature">🛁 2 Baths</div>

<div class="feature">📐 1800 sqft</div>

</div>

<p>
Beautiful modern family home located in a peaceful neighborhood.
Close to schools, shopping centers and public transport.
Perfect for families looking for comfort and convenience.
</p>

<button class="btn">
Contact Owner
</button>

</div>

</div>

</div>

</body>
</html>
