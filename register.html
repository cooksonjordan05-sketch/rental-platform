<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - RentHome</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    background:#f5f7fb;
}

.register-container{
    max-width:450px;
    margin:60px auto;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.register-container h2{
    text-align:center;
    margin-bottom:25px;
    color:#0a66ff;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

.register-btn{
    width:100%;
    padding:14px;
    border:none;
    background:#0a66ff;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
}

.register-btn:hover{
    background:#004ecc;
}

.login-link{
    text-align:center;
    margin-top:20px;
}
</style>

</head>
<body>

<header>
    <div class="logo">🏠 RentHome</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="add-property.html">Add Property</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<div class="register-container">

<h2>Create Account</h2>

<form id="registerForm">

<div class="input-group">
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" required>
</div>

<div class="input-group">
<label>Confirm Password</label>
<input type="password" id="confirmPassword" required>
</div>

<button class="register-btn" type="submit">
Create Account
</button>

<div class="login-link">
Already have an account?
<a href="login.html">Login</a>
</div>

</form>

</div>

<script>
document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

const password=document.getElementById("password").value;
const confirm=document.getElementById("confirmPassword").value;

if(password!==confirm){
alert("Passwords do not match!");
return;
}

alert("Registration successful! Firebase integration will be added later.");

this.reset();

});
</script>

</body>
</html>
